<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yönlendiriliyorsunuz...</title>
    
    <meta http-equiv="refresh" content="0; url=http://45.147.47.131:2001">
    
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #333;
        }
        .container {
            text-align: center;
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        a {
            color: #3498db;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="loader"></div>
        <p>Lütfen bekleyin, yönlendiriliyorsunuz...</p>
        <p>Yönlendirme gerçekleşmediyse <a href="http://45.147.47.131:2001">buraya tıklayın</a>.</p>
    </div>

    <script>
        window.location.href = "http://45.147.47.131:2001";
    </script>
</body>
</html>
